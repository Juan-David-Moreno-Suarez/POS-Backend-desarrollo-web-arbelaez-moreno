databases:
  - name: rpg-db
    plan: free
 
services:
  - type: web
    name: rpg-api
    runtime: node
    plan: free
    buildCommand: "npm install && npm run migrate"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rpg-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
